<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliver Impresores | Inicio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- El Header se cargará aquí automáticamente -->
    <div id="global-header"></div>

    <!-- SECCIÓN HERO ULTRA DINÁMICA -->
    <section class="hero-dynamic">
        <!-- Fondos decorativos abstractos -->
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>

        <div class="hero-dyn-container">
            
            <!-- Bloque de Texto Izquierdo -->
            <div class="hero-dyn-text">
                <span class="badge">Más de 30 años de excelencia</span>
                <h1>Impresión Industrial <br><span class="text-gradient">Sin Límites</span></h1>
                <p>Especialistas en empaques, respaldos termosellantes, etiquetas y papelería corporativa de alta fidelidad. Llevamos soluciones directamente a tu empresa.</p>
                <div class="hero-dyn-actions">
                    <a href="contacto.html" class="btn-dyn-primary">Cotizar Proyecto</a>
                    <a href="servicios.html" class="btn-dyn-secondary">Ver Servicios</a>
                </div>
            </div>

            <!-- Bloque de Imagen Derecho con Animación y Efecto de Capas -->
            <div class="hero-dyn-visual">
                <div class="dynamic-circle"></div>
                <div class="floating-card card-1">✨ Alta Definición</div>
                <div class="floating-card card-2">📦 Empaques</div>
                <img src="img/hero.webp" alt="Maquinaria de Impresión Industrial Oliver Impresores" class="hero-dyn-img">
            </div>

        </div>
    </section>

    <!-- El Footer se cargará aquí automáticamente -->
    <div id="global-footer"></div>

    <script src="js/main.js"></script>
</body>
</html>
